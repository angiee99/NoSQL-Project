services:
  mongo1:
    image: mongo:8
    container_name: mongo1
    entrypoint: 
      - /bin/bash
      - -c
      - |
        # Start MongoDB in the background
        mongod --replSet rs0 --bind_ip_all --keyFile /run/secrets/mongo_key &

        # Wait for the database to start
        echo "Waiting for MongoDB to start..."
        until mongosh --port 27017 --eval "db.adminCommand('ping')" --quiet; do
          sleep 2
        done

        # Execute the JS initialization script
        echo "Initializing Replica Set..."
        MONGO_ROOT_PASSWORD=$MONGO_ROOT_PASSWORD mongosh --port 27017 --file /init-rs.js
        
        # Stay alive
        wait
    volumes:
      - mongo1_data:/data/db
      - ./scripts/init-rs.js:/init-rs.js:ro
    environment:
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - mongo-cluster
    secrets:
      - mongo_key

  mongo2:
    image: mongo:8
    container_name: mongo2
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /run/secrets/mongo_key
    volumes:
      - mongo2_data:/data/db
    networks:
      - mongo-cluster
    secrets:
      - mongo_key

  mongo3:
    image: mongo:8
    container_name: mongo3
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /run/secrets/mongo_key
    volumes:
      - mongo3_data:/data/db
    networks:
      - mongo-cluster
    secrets:
      - mongo_key

networks:
  mongo-cluster:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:

secrets:
  mongo_key:
    file: ./secrets/mongo-keyfile